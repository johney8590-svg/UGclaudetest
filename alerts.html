<script>
document.addEventListener('DOMContentLoaded', () => {
  const stores = getStores(), cfg = getSettings();
  const DOW_NAMES = ['日','一','二','三','四','五','六'];
  const reds = stores.filter(s=>getAlert(s,cfg)==='red');
  const ambs = stores.filter(s=>getAlert(s,cfg)==='amber');
  const norms = stores.filter(s=>!getAlert(s,cfg));
  document.getElementById('alertMetrics').innerHTML = `
    <div class="mc"><div class="lb"><i class="fa-solid fa-circle-exclamation"></i> 嚴重異常</div><div class="vl" style="color:#b03030;">${reds.length} 間</div><div class="sb dn">跌幅 ≥ ${cfg.redPct}%</div></div>
    <div class="mc"><div class="lb"><i class="fa-solid fa-triangle-exclamation"></i> 注意觀察</div><div class="vl" style="color:#b07000;">${ambs.length} 間</div><div class="sb wn">跌幅 ${cfg.ambPct}–${cfg.redPct-1}%</div></div>
    <div class="mc"><div class="lb"><i class="fa-solid fa-circle-check"></i> 正常門市</div><div class="vl" style="color:#1a7a2a;">${norms.length} 間</div><div class="sb up">達標或持平</div></div>
  `;
  function card(s) {
    const b=getBase(s), p=pctDiff(s.today,b), al=getAlert(s,cfg);
    const bg=al==='red'?'#fff0f0':al==='amber'?'#fff8e8':'#f0faf0';
    const dc=al==='red'?'#c04040':al==='amber'?'#8a5000':'#1a7a2a';
    const bw=Math.min(100,Math.round(s.today/b*100));
    const bc=al==='red'?'#e05050':al==='amber'?'#c07800':'#2d7a2d';
    return `<div style="background:${bg};border:0.5px solid var(--ug-border);border-radius:10px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div><div style="font-size:14px;font-weight:600;color:var(--ug-text-dark);">${s.name}</div><div style="font-size:12px;color:var(--ug-text-muted);margin-top:2px;">${s.area}</div></div>
        <div style="text-align:right;"><div style="font-size:18px;font-weight:600;">$${s.today.toLocaleString()}</div><div style="font-size:12px;color:${dc};margin-top:2px;">${p>=0?'▲':'▼'} ${Math.abs(p)}% vs PSD $${b.toLocaleString()}</div></div>
      </div>
      <div style="margin-top:10px;background:rgba(255,255,255,0.6);border-radius:4px;height:6px;"><div style="height:6px;border-radius:4px;background:${bc};width:${bw}%;"></div></div>
    </div>`;
  }
  if(reds.length) document.getElementById('redSection').innerHTML=`<div class="card-hd" style="margin-bottom:8px;color:#a03030;"><i class="fa-solid fa-circle-exclamation"></i> 嚴重異常門市</div>`+reds.map(card).join('');
  if(ambs.length) document.getElementById('ambSection').innerHTML=`<div class="card-hd" style="margin-bottom:8px;color:#8a5000;"><i class="fa-solid fa-triangle-exclamation"></i> 注意觀察門市</div>`+ambs.map(card).join('');
  if(norms.length) document.getElementById('normalSection').innerHTML=`<div class="card-hd" style="margin-bottom:8px;"><i class="fa-solid fa-circle-check" style="color:var(--ug-green);"></i> 正常門市</div>`+norms.map(card).join('');
});
</script></body></html>
