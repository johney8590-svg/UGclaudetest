<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>門市列表 — Unique Green</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
  <span class="brand-name">Unique Green</span>
  <span style="width:32px;"></span>
</div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img data-brand-logo src="" alt="UG" style="height:32px;">
    <div class="brand-text">
      <div class="brand-name">Unique Green</div>
      <div class="tagline">營運管理系統</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-group-label">總覽</div>
    <a class="nav-item" href="../index.html" data-page="index.html"><i class="fa-solid fa-chart-line"></i>儀表板</a>
    <a class="nav-item" href="alerts.html" data-page="alerts.html"><i class="fa-solid fa-bell"></i>異常警示<span class="nav-badge" id="alertCount"></span></a>
    <div class="nav-group-label">門市管理</div>
    <a class="nav-item" href="stores.html" data-page="stores.html"><i class="fa-solid fa-store"></i>門市列表</a>
    <div class="nav-group-label">業績分析</div>
    <a class="nav-item" href="psd.html" data-page="psd.html"><i class="fa-solid fa-calendar-days"></i>PSD 基準明細</a>
    <div class="nav-group-label">系統</div>
    <a class="nav-item" href="settings.html" data-page="settings.html"><i class="fa-solid fa-gear"></i>管理後台</a>
    <a class="nav-item" href="import.html" data-page="import.html"><i class="fa-solid fa-file-arrow-up"></i>匯入資料</a>
  </div>
  <div class="sidebar-footer">
    <div class="avatar-row">
      <div class="avatar">督</div>
      <div>
        <div class="avatar-name">陳督導</div>
        <div class="avatar-role">北部區域督導</div>
      </div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title">門市列表</span>
      <span class="breadcrumb">/ 督導篩選</span>
    </div>
    <div class="topbar-right">
      <span class="date-pill"><i class="fa-regular fa-calendar"></i><span id="todayDate"></span></span>
      <button class="btn keep-mobile" onclick="selAll()"><i class="fa-solid fa-check-double"></i>全選</button>
      <button class="btn keep-mobile" onclick="clrAll()"><i class="fa-solid fa-xmark"></i>清除</button>
    </div>
  </div>
  <div class="content">

    <!-- Summary KPIs for selected stores -->
    <div class="metrics-grid" id="selMetrics"></div>

    <!-- Area filter -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="areaFilter"></div>

    <!-- Store chips -->
    <div class="store-grid" id="storeGrid"></div>

    <!-- Detail table -->
    <div class="table-card">
      <div class="card-hd" style="margin-bottom:12px;"><i class="fa-solid fa-table" style="color:var(--ug-green);"></i>所選門市明細</div>
      <table class="dt">
        <thead>
          <tr><th>#</th><th>門市</th><th>區域</th><th>今日營收</th><th>PSD 基準</th><th>vs 基準</th><th>狀態</th><th>達成率</th></tr>
        </thead>
        <tbody id="detailRows"></tbody>
      </table>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../js/logo.js"></script>
<script src="../js/shared.js"></script>
<script>
const stores = getStores(), cfg = getSettings();
let selected = new Set(stores.map(s => s.id));
let filterArea = null;

function render() {
  const sel = stores.filter(s => selected.has(s.id));
  const tRev  = sel.reduce((a,s) => a+s.today, 0);
  const tBase = sel.reduce((a,s) => a+getBase(s), 0);
  const op    = tBase ? pctDiff(tRev, tBase) : 0;
  const abn   = stores.filter(s => getAlert(s, cfg)).length;
  const achv  = sel.length ? Math.round(sel.filter(s => s.today>=getBase(s)).length/sel.length*100) : 0;

  document.getElementById('selMetrics').innerHTML = `
    <div class="mc"><div class="lb">所選合計營收</div><div class="vl">$${tRev.toLocaleString()}</div><div class="sb ${op>=0?'up':'dn'}">${op>=0?'▲':'▼'} ${Math.abs(op)}% vs PSD</div></div>
    <div class="mc"><div class="lb">選取 / 全部</div><div class="vl">${sel.length}<span style="font-size:14px;font-weight:400;color:var(--ug-text-muted);"> / ${stores.length}</span></div><div class="sb text-muted">間門市</div></div>
    <div class="mc"><div class="lb">全品牌異常</div><div class="vl" style="color:${abn>0?'#dc2626':'#16a34a'}">${abn} 間</div><div class="sb ${abn>0?'dn':'up'}">${abn>0?'需關注':'全部正常'}</div></div>
    <div class="mc"><div class="lb">達標率（所選）</div><div class="vl">${achv}%</div><div class="sb up">vs 各店 PSD</div></div>
  `;

  // Area filter buttons
  const areas = [...new Set(stores.map(s => s.area))];
  document.getElementById('areaFilter').innerHTML =
    `<button class="btn keep-mobile ${filterArea===null?'primary':''}" onclick="setArea(null)" style="font-size:11px;padding:4px 10px;">全部</button>` +
    areas.map(a => `<button class="btn keep-mobile ${filterArea===a?'primary':''}" onclick="setArea('${a}')" style="font-size:11px;padding:4px 10px;">${a}</button>`).join('');

  // Chips
  const g = document.getElementById('storeGrid'); g.innerHTML = '';
  const visibleStores = filterArea ? stores.filter(s => s.area === filterArea) : stores;
  visibleStores.forEach(s => {
    const isSel = selected.has(s.id);
    const al = getAlert(s, cfg);
    const p  = pctDiff(s.today, getBase(s));
    const dHtml = p >= 0 ? `<div class="sd up">▲${p}%</div>`
                : al==='red'   ? `<div class="sd dn">▼${Math.abs(p)}% 異常</div>`
                : al==='amber' ? `<div class="sd wn">▼${Math.abs(p)}% 注意</div>`
                : `<div class="sd dn">▼${Math.abs(p)}%</div>`;
    const d = document.createElement('div');
    d.className = `chip ${isSel?'sel':''} ${al==='red'?'alr':al==='amber'?'ala':''}`;
    d.innerHTML = `<div class="sn">${s.name}</div><div class="sa">${s.area}</div><div class="sr">$${s.today.toLocaleString()}</div>${dHtml}`;
    d.onclick = () => { if(selected.has(s.id)) selected.delete(s.id); else selected.add(s.id); render(); };
    g.appendChild(d);
  });

  // Table
  const tbody = document.getElementById('detailRows'); tbody.innerHTML = '';
  sel.sort((a,b) => (b.today/getBase(b)) - (a.today/getBase(a))).forEach((s, i) => {
    const base = getBase(s);
    const p  = pctDiff(s.today, base);
    const al = getAlert(s, cfg);
    const bw = Math.min(100, Math.round(s.today/base*100));
    const bc = al==='red' ? '#dc2626' : al==='amber' ? '#d97706' : '#1f8c3b';
    const badge = al==='red' ? '<span class="badge b-r">異常</span>' : al==='amber' ? '<span class="badge b-y">注意</span>' : '<span class="badge b-g">達標</span>';
    const delta = p>=0 ? `<span class="up fw6">▲${p}%</span>` : `<span class="${al==='red'?'dn':'wn'} fw6">▼${Math.abs(p)}%</span>`;
    tbody.innerHTML += `<tr>
      <td class="text-muted">${i+1}</td>
      <td class="fw6">${s.name}</td>
      <td class="text-muted">${s.area}</td>
      <td>$${s.today.toLocaleString()}</td>
      <td class="text-muted">$${base.toLocaleString()}</td>
      <td>${delta}</td>
      <td>${badge}</td>
      <td><div style="display:flex;align-items:center;gap:5px;">
        <div class="bar-w"><div class="bar-f" style="width:${bw}%;background:${bc};"></div></div>
        <span style="font-size:11px;color:var(--ug-text-muted);">${bw}%</span>
      </div></td>
    </tr>`;
  });
}

function selAll() { selected = new Set(stores.map(s=>s.id)); render(); }
function clrAll() { selected.clear(); render(); }
function setArea(a) { filterArea = a; render(); }

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
